<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anything Analyzer</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <strong data-i18n="appTitle">Anything Analyzer</strong>
          <span id="targetLabel">Tab</span>
        </div>
        <select id="languageSelect" title="Language">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
        </select>
      </header>

      <section class="captureBar">
        <button id="startBtn" class="primary" data-i18n="start">开始</button>
        <button id="pauseBtn" data-i18n="pause">暂停</button>
        <button id="stopBtn" class="danger" data-i18n="stop">停止</button>
        <button id="reloadBtn" data-i18n="reload">刷新</button>
        <button id="clearBtn" data-i18n="clear">清空</button>
        <button id="exportDataBtn" data-i18n="exportData">导出数据</button>
        <button id="importDataBtn" data-i18n="importData">导入数据</button>
        <input id="importDataInput" type="file" accept="application/json,.json" hidden>
      </section>

      <section class="optionGrid">
        <label><input id="captureNetworkInput" type="checkbox" checked> <span data-i18n="network">网络</span></label>
        <label><input id="captureHooksInput" type="checkbox" checked> <span data-i18n="hooks">JS Hook</span></label>
        <label><input id="captureStorageInput" type="checkbox" checked> <span data-i18n="storage">存储快照</span></label>
        <label><input id="captureCookiesInput" type="checkbox" checked> <span data-i18n="cookies">Cookie API</span></label>
      </section>

      <section class="summary">
        <div><b id="requestCount">0</b><span data-i18n="requests">请求</span></div>
        <div><b id="hookCount">0</b><span data-i18n="hookEvents">Hook</span></div>
        <div><b id="storageCount">0</b><span data-i18n="snapshots">快照</span></div>
        <div><b id="statusText">Stopped</b><span data-i18n="state">状态</span></div>
      </section>

      <section class="filters">
        <input id="searchInput" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="搜索 URL、状态、字段">
        <select id="statusFilter">
          <option value="" data-i18n="allStatus">全部状态</option>
          <option value="2xx">2xx</option>
          <option value="3xx">3xx</option>
          <option value="4xx">4xx</option>
          <option value="5xx">5xx</option>
          <option value="error" data-i18n="errors">错误</option>
        </select>
      </section>

      <nav class="tabs">
        <button class="tab active" data-view="requests" data-i18n="tabRequests">请求</button>
        <button class="tab" data-view="hooks" data-i18n="tabHooks">Hook</button>
        <button class="tab" data-view="storage" data-i18n="tabStorage">存储</button>
        <button class="tab" data-view="ai" data-i18n="tabAi">AI 分析</button>
        <button class="tab" data-view="settings" data-i18n="tabSettings">设置</button>
      </nav>

      <section id="requestsView" class="view active">
        <div id="requestsList" class="list"></div>
      </section>

      <section id="hooksView" class="view">
        <div id="hooksList" class="list"></div>
      </section>

      <section id="storageView" class="view">
        <button id="snapshotBtn" data-i18n="manualSnapshot">手动 Cookie 快照</button>
        <div id="storageList" class="list"></div>
      </section>

      <section id="aiView" class="view">
        <div class="formGrid">
          <label>
            <span data-i18n="analysisMode">分析模式</span>
            <select id="analysisMode">
              <option value="auto" data-i18n="modeAuto">自动识别</option>
              <option value="api" data-i18n="modeApi">API 逆向</option>
              <option value="security" data-i18n="modeSecurity">安全审计</option>
              <option value="performance" data-i18n="modePerformance">性能分析</option>
              <option value="crypto" data-i18n="modeCrypto">加密分析</option>
            </select>
          </label>
          <label>
            <span data-i18n="analysisScope">分析范围</span>
            <select id="analysisScope">
              <option value="all" data-i18n="scopeAll">全部数据</option>
              <option value="filtered" data-i18n="scopeFiltered">过滤后数据</option>
              <option value="selected" data-i18n="scopeSelected">选中请求</option>
            </select>
          </label>
        </div>
        <div class="row">
          <button id="analyzeBtn" class="primary" data-i18n="analyze">开始分析</button>
          <button id="copyAnalysisBtn" data-i18n="copy">复制</button>
          <button id="exportAnalysisBtn" data-i18n="exportMd">导出 MD</button>
        </div>
        <div class="promptGrid">
          <button class="promptBtn" data-prompt="api" data-i18n="promptApi">梳理接口和鉴权流程</button>
          <button class="promptBtn" data-prompt="risk" data-i18n="promptRisk">检查安全风险</button>
          <button class="promptBtn" data-prompt="crypto" data-i18n="promptCrypto">分析加密/签名逻辑</button>
          <button class="promptBtn" data-prompt="replay" data-i18n="promptReplay">生成复现代码</button>
        </div>
        <div id="chatList" class="chatList"></div>
        <div class="chatBox">
          <textarea id="chatInput" rows="3" data-i18n-placeholder="chatPlaceholder" placeholder="输入你想追问的问题"></textarea>
          <button id="sendChatBtn" class="primary" data-i18n="send">发送</button>
        </div>
        <pre id="analysisOutput" class="output" data-i18n="analysisEmpty">配置 AI 后，捕获流量并点击开始分析。</pre>
      </section>

      <section id="settingsView" class="view">
        <div class="formGrid">
          <label>
            <span data-i18n="provider">协议</span>
            <select id="providerSelect">
              <option value="openai">OpenAI Compatible</option>
              <option value="anthropic">Claude Code / Anthropic Messages</option>
            </select>
          </label>
          <label>
            <span data-i18n="baseUrl">Base URL</span>
            <input id="baseUrlInput" placeholder="api.openai.com">
          </label>
          <label>
            <span data-i18n="apiKey">API Key</span>
            <input id="apiKeyInput" type="password" placeholder="sk-...">
          </label>
          <label>
            <span data-i18n="model">Model</span>
            <div class="modelRow combo">
              <input id="modelInput" autocomplete="off" placeholder="gpt-4.1-mini">
              <button id="modelMenuBtn" type="button" class="comboBtn">▼</button>
              <button id="fetchModelsBtn" data-i18n="fetchModels">获取</button>
            </div>
          </label>
          <p id="modelStatus" class="inlineStatus"></p>
          <div id="modelMenu" class="modelMenu" hidden></div>
          <button id="testModelBtn" data-i18n="testModel">测试模型</button>
          <label>
            <span data-i18n="bodyLimit">Body 字符数</span>
            <input id="bodyLimitInput" type="number" min="512" max="20000" step="512">
          </label>
          <label id="anthropicVersionWrap">
            <span data-i18n="anthropicVersion">Anthropic Version</span>
            <input id="anthropicVersionInput" placeholder="2023-06-01">
          </label>
          <button id="saveSettingsBtn" class="primary" data-i18n="saveSettings">保存设置</button>
          <p id="settingsStatus"></p>
        </div>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
