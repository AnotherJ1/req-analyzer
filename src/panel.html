<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Req Analyzer</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <strong data-i18n="appTitle">Req Analyzer</strong>
          <span id="targetLabel">Current tab</span>
          <select id="languageSelect" title="Language">
            <option value="en">English</option>
            <option value="zh-CN">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <div class="toolbar">
          <button id="startBtn" class="primary" data-i18n="start">Start</button>
          <button id="pauseBtn" data-i18n="pause">Pause</button>
          <button id="stopBtn" class="danger" data-i18n="stop">Stop</button>
          <button id="reloadBtn" data-i18n-title="reload">Reload</button>
          <button id="snapshotBtn" data-i18n-title="manualSnapshot">Snapshot</button>
          <button id="clearBtn" data-i18n-title="clear">Clear</button>
          <select id="exportFormat" data-i18n-title="export">
            <option value="session" data-i18n="sessionJson">Session JSON</option>
            <option value="har" data-i18n="har">HAR</option>
            <option value="requests" data-i18n="requestsJson">Requests JSON</option>
            <option value="hooks" data-i18n="hooksJson">Hooks JSON</option>
            <option value="storage" data-i18n="storageJson">Storage JSON</option>
            <option value="analysis" data-i18n="analysisMd">Analysis MD</option>
          </select>
          <button id="exportBtn" data-i18n-title="export">Export</button>
          <button id="settingsBtn" data-i18n-title="tabSettings">Settings</button>
        </div>
      </header>

      <section class="summary" aria-label="Session summary">
        <div>
          <span class="metric" id="requestCount">0</span>
          <span data-i18n="summaryRequests">Requests</span>
        </div>
        <div>
          <span class="metric" id="hookCount">0</span>
          <span data-i18n="summaryHooks">Hooks</span>
        </div>
        <div>
          <span class="metric" id="storageCount">0</span>
          <span data-i18n="summarySnapshots">Snapshots</span>
        </div>
        <div>
          <span class="metric" id="errorCount">0</span>
          <span data-i18n="summaryErrors">Errors</span>
        </div>
        <div>
          <span class="metric" id="statusText">Stopped</span>
          <span data-i18n="captureLabel">Capture</span>
        </div>
      </section>

      <section class="controlStrip" aria-label="Capture controls">
        <label><input id="captureNetworkInput" type="checkbox" checked> <span data-i18n="network">Network</span></label>
        <label><input id="captureHooksInput" type="checkbox" checked> <span data-i18n="hooks">JS hooks</span></label>
        <label><input id="captureStorageInput" type="checkbox" checked> <span data-i18n="storage">Storage snapshots</span></label>
        <label><input id="captureCookiesInput" type="checkbox" checked> <span data-i18n="cookies">Cookie API snapshot</span></label>
        <label>
          <span data-i18n="tableStatus">Status</span>
          <select id="statusFilter">
            <option value="" data-i18n="allStatus">All</option>
            <option value="2xx">2xx</option>
            <option value="3xx">3xx</option>
            <option value="4xx">4xx</option>
            <option value="5xx">5xx</option>
            <option value="error" data-i18n="errors">Errors</option>
          </select>
        </label>
      </section>

      <nav class="tabs" aria-label="Views">
        <button class="tab active" data-view="requests" data-i18n="tabRequests">Requests</button>
        <button class="tab" data-view="hooks" data-i18n="tabHooks">Hooks</button>
        <button class="tab" data-view="storage" data-i18n="tabStorage">Storage</button>
        <button class="tab" data-view="analysis" data-i18n="tabAnalysis">Analysis</button>
      </nav>

      <section class="filters">
        <input id="searchInput" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="Filter by URL, method, status, hook kind, storage key">
        <select id="domainFilter" title="Domain filter">
          <option value="" data-i18n="allDomains">All domains</option>
        </select>
      </section>

      <section id="requestsView" class="view active">
        <div class="split">
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th class="seq" data-i18n="tableSeq">#</th>
                  <th class="method" data-i18n="tableMethod">Method</th>
                  <th class="status" data-i18n="tableStatus">Status</th>
                  <th data-i18n="tableUrl">URL</th>
                  <th class="size" data-i18n="tableSize">Size</th>
                  <th class="time" data-i18n="tableTime">Time</th>
                </tr>
              </thead>
              <tbody id="requestsTable"></tbody>
            </table>
          </div>
          <aside class="detail" id="requestDetail">
            <div class="empty" data-i18n="selectRequest">Select a request</div>
          </aside>
        </div>
      </section>

      <section id="hooksView" class="view">
        <div class="eventList" id="hooksList"></div>
      </section>

      <section id="storageView" class="view">
        <div class="eventList" id="storageList"></div>
      </section>

      <section id="analysisView" class="view">
        <div class="analysisControls">
          <select id="analysisMode">
            <option value="auto" data-i18n="modeAuto">Auto detect</option>
            <option value="api" data-i18n="modeApi">API reverse engineering</option>
            <option value="security" data-i18n="modeSecurity">Security audit</option>
            <option value="performance" data-i18n="modePerformance">Performance</option>
            <option value="crypto" data-i18n="modeCrypto">JS crypto analysis</option>
          </select>
          <select id="analysisScope">
            <option value="all" data-i18n="scopeAll">All captured data</option>
            <option value="filtered" data-i18n="scopeFiltered">Filtered data</option>
            <option value="selected" data-i18n="scopeSelected">Selected request</option>
          </select>
          <button id="analyzeBtn" class="primary" data-i18n="analyze">Analyze</button>
          <button id="copyAnalysisBtn" data-i18n="copy">Copy</button>
          <button id="clearAnalysisBtn" data-i18n="clear">Clear</button>
        </div>
        <pre id="analysisOutput" class="analysisOutput" data-i18n="analysisEmpty">Configure an OpenAI-compatible endpoint, capture traffic, then run analysis.</pre>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <header>
          <strong data-i18n="tabSettings">AI Settings</strong>
          <button value="cancel" class="iconBtn" data-i18n-title="close">x</button>
        </header>
        <label>
          <span data-i18n="baseUrl">Base URL</span>
          <input id="baseUrlInput" placeholder="https://api.openai.com/v1">
        </label>
        <label>
          <span data-i18n="apiKey">API key</span>
          <input id="apiKeyInput" type="password" placeholder="sk-...">
        </label>
        <label>
          <span data-i18n="model">Model</span>
          <input id="modelInput" placeholder="gpt-4.1-mini">
        </label>
        <label>
          <span data-i18n="maxBodyChars">Max captured body chars per request</span>
          <input id="bodyLimitInput" type="number" min="512" max="20000" step="512">
        </label>
        <footer>
          <button id="saveSettingsBtn" value="default" class="primary" data-i18n="saveSettings">Save</button>
        </footer>
      </form>
    </dialog>

    <script src="capture-utils.js"></script>
    <script src="i18n.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
